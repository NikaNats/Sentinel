name: sentinel-fapi2-stack

services:
  postgres:
    image: postgres:17-alpine
    container_name: sentinel-postgres
    environment:
      POSTGRES_DB: sentinel_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - sentinel-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sentinel_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: sentinel-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_FEATURES: dpop,par,fips:preview
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "false"
      KC_HTTPS_PORT: 8443
      KC_HTTPS_PROTOCOLS: TLSv1.3
      KC_HTTPS_CERTIFICATE_FILE: /etc/x509/https/tls.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /etc/x509/https/tls.key
    ports:
      - "8443:8443"
    volumes:
      - ./infra/keycloak/realms:/opt/keycloak/data/import:ro
      - ./infra/certs/keycloak.crt:/etc/x509/https/tls.crt:ro
      - ./infra/certs/keycloak.key:/etc/x509/https/tls.key:ro
    command:
      - start-dev
      - --import-realm
    healthcheck:
      test: ["CMD-SHELL", "curl -k -s -f https://localhost:8443/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  sentinel-api:
    build:
      context: .
      dockerfile: src/Sentinel.AspNetCore/Dockerfile
    container_name: sentinel-api
    depends_on:
      keycloak:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5260:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Redis: redis:6379
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=sentinel_dev;Username=postgres;Password=postgres
      Keycloak__Authority: https://keycloak:8443/realms/sentinel
      Keycloak__Audience: sentinel-api
      Keycloak__RequireHttpsMetadata: "true"

volumes:
  sentinel-postgres-data:

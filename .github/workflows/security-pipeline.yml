name: Sentinel Core CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build-test-scan:
    name: Build, Test & Core Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup .NET 11
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 11.0.x

      - name: Gate 1 - Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Gate 2 - SAST (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/csharp

      - name: Gate 3 - NuGet Dependency Audit
        run: |
          dotnet restore Sentinel.slnx
          dotnet list Sentinel.slnx package --vulnerable --include-transitive

      - name: Gate 4 - Build & Test
        run: dotnet test Sentinel.slnx --configuration Release --logger "console;verbosity=detailed"

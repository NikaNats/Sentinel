name: Sentinel Core CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# ARCHITECT'S NOTE: Proactively opting into Node 24 runtime
# to meet the June 2026 compliance deadline and address NIST 800-53 SI-2 requirements.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  build-scan:
    name: Build & Core Security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure Full Git History For Versioning
        run: |
          if git rev-parse --is-shallow-repository | grep -q true; then
            git fetch --prune --unshallow --tags
          else
            git fetch --prune --tags
          fi

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore strong-name key (Staging/Release Only)
        if: ${{ secrets.SENTINEL_SNK_BASE64 != '' }}
        shell: bash
        run: echo "$SENTINEL_SNK_BASE64" | base64 -d > Sentinel.snk
        env:
          SENTINEL_SNK_BASE64: ${{ secrets.SENTINEL_SNK_BASE64 }}

      - name: Gate 1 - Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Gate 2 - SAST (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/csharp

      - name: Gate 3 - NuGet Dependency Audit
        run: |
          dotnet restore Sentinel.slnx
          dotnet list Sentinel.slnx package --vulnerable --include-transitive

      - name: Gate 4 - Build
        run: dotnet build Sentinel.slnx --configuration Release --no-restore

  test-suites:
    name: Test (${{ matrix.test-project }})
    runs-on: ubuntu-latest
    needs: build-scan
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        test-project:
          - tests/Sentinel.Tests.Unit/Sentinel.Tests.Unit.csproj
          - tests/Sentinel.Tests.Integration/Sentinel.Tests.Integration.csproj
          - tests/Sentinel.Tests.Security/Sentinel.Tests.Security.csproj

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure Full Git History For Versioning
        run: |
          if git rev-parse --is-shallow-repository | grep -q true; then
            git fetch --prune --unshallow --tags
          else
            git fetch --prune --tags
          fi

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore strong-name key (Staging/Release Only)
        if: ${{ secrets.SENTINEL_SNK_BASE64 != '' }}
        shell: bash
        run: echo "$SENTINEL_SNK_BASE64" | base64 -d > Sentinel.snk
        env:
          SENTINEL_SNK_BASE64: ${{ secrets.SENTINEL_SNK_BASE64 }}

      - name: Restore
        run: dotnet restore ${{ matrix.test-project }}

      - name: Test
        run: dotnet test ${{ matrix.test-project }} --configuration Release --no-restore --logger "console;verbosity=detailed"

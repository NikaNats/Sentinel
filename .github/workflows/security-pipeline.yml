name: Sentinel Core CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# ARCHITECT'S NOTE: Proactively opting into Node 24 runtime
# to meet the June 2026 compliance deadline and address NIST 800-53 SI-2 requirements.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SkipGetBuildVersion: true
  CloudBuild: false
  GitVersioningCloudBuild: false

permissions:
  contents: read

jobs:
  build-scan:
    name: Build & Core Security
    runs-on: ubuntu-latest
    env:
      SENTINEL_SNK_BASE64: ${{ secrets.SENTINEL_SNK_BASE64 }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure Full Git History For Versioning
        run: |
          git fetch origin main --unshallow || true
          git fetch --prune --unshallow --tags || true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore strong-name key (Staging/Release Only)
        if: ${{ env.SENTINEL_SNK_BASE64 != '' }}
        shell: bash
        run: echo "$SENTINEL_SNK_BASE64" | base64 -d > Sentinel.snk

      - name: Gate 1 - Secret Scanning
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --only-verified

      - name: Gate 2 - SAST (Semgrep)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/csharp

      - name: Gate 3 - NuGet Dependency Audit
        run: |
          dotnet restore Sentinel.slnx --locked-mode
          dotnet list Sentinel.slnx package --vulnerable --include-transitive

      - name: Setup NodeJS (for OpenAPI Audit)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Gate 4 - Build & Generate OpenAPI Contract (from AdversarialTestHost)
        run: dotnet build tests/Sentinel.Tests.Load/AdversarialTestHost.csproj --configuration Release

      - name: Fetch OpenAPI Schema from Running Host
        run: |
          dotnet run --project tests/Sentinel.Tests.Load/AdversarialTestHost.csproj -c Release --no-build --urls http://localhost:5000 > host.log 2>&1 &
          HOST_PID=$!
          
          echo "Waiting for AdversarialTestHost (PID: $HOST_PID) to start..."
          READY=false
          for i in {1..30}; do
            if curl -s http://localhost:5000/healthz > /dev/null 2>&1; then
              echo "✓ Host is ready!"
              READY=true
              break
            fi
            sleep 1
          done
          
          if [ "$READY" = "false" ]; then
            echo "CRITICAL: Host failed to start. Printing crash logs:"
            cat host.log
            exit 1
          fi
          
          echo "Fetching compiled OpenAPI schema..."
          curl -s http://localhost:5000/openapi/v1.json -o docs/generated_openapi.json
          
          echo "Gracefully terminating AdversarialTestHost (PID: $HOST_PID)..."
          kill $HOST_PID
          wait $HOST_PID 2>/dev/null || true

      - name: Gate 5 - OpenAPI Schema Drift Audit
        run: |
          chmod +x tests/infrastructure-openapi-audit.sh
          ./tests/infrastructure-openapi-audit.sh

  test-suites:
    name: Test (${{ matrix.test-project }})
    runs-on: ubuntu-latest
    needs: build-scan
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SENTINEL_SNK_BASE64: ${{ secrets.SENTINEL_SNK_BASE64 }}
    strategy:
      fail-fast: false
      matrix:
        test-project:
          - tests/Sentinel.Tests.Unit/Sentinel.Tests.Unit.csproj
          - tests/Sentinel.Tests.Integration/Sentinel.Tests.Integration.csproj
          - tests/Sentinel.Tests.Security/Sentinel.Tests.Security.csproj

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure Full Git History For Versioning
        run: |
          git fetch origin main --unshallow || true
          git fetch --prune --unshallow --tags || true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore strong-name key (Staging/Release Only)
        if: ${{ env.SENTINEL_SNK_BASE64 != '' }}
        shell: bash
        run: echo "$SENTINEL_SNK_BASE64" | base64 -d > Sentinel.snk

      - name: Restore
        run: dotnet restore ${{ matrix.test-project }} --locked-mode

      - name: Test
        run: dotnet test ${{ matrix.test-project }} --configuration Release --no-restore --logger "console;verbosity=detailed" -p:SkipGetBuildVersion=true -p:NBGV_Disable=true

  schemathesis-fuzzing:
    name: Dynamic OpenAPI Schema Fuzzing
    runs-on: ubuntu-latest
    needs: build-scan

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure Full Git History For Versioning
        run: |
          git fetch origin main --unshallow || true
          git fetch --prune --unshallow --tags || true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Schemathesis CLI
        run: pip install schemathesis

      - name: Build Test Host
        run: dotnet build tests/Sentinel.Tests.Load/AdversarialTestHost.csproj --configuration Release

      - name: Start Test Host in Background (HTTP only, redirect disabled)
        run: |
          nohup dotnet run --project tests/Sentinel.Tests.Load/AdversarialTestHost.csproj -c Release -p:SkipGetBuildVersion=true -p:NBGV_Disable=true --no-build --urls http://localhost:5000 > /dev/null 2>&1 &
          echo "Waiting for AdversarialTestHost to bind to http://localhost:5000..."
          for i in {1..30}; do
            if curl -s http://localhost:5000/healthz > /dev/null 2>&1; then
              echo "✓ Host is ready!"
              break
            fi
            sleep 1
          done

      - name: Run Schemathesis API Schema Fuzzing
        env:
          PYTHONIOENCODING: utf-8
        run: |
          chcp 65001 2>/dev/null || true
          export PYTHONIOENCODING=utf-8
          schemathesis run docs/OPENAPI_3_1.yaml \
            --url http://localhost:5000 \
            --checks not_a_server_error \
            --workers 4
        continue-on-error: false

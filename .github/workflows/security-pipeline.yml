name: Sentinel FAPI 2.0 Security Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write
  id-token: write

jobs:
  quality-gates:
    name: 9-Stage Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gate 1 - Secret Scanning
        uses: trufflesecurity/trufflehog@v3
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha || github.event.before || 'HEAD~1' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Gate 2 - SAST (Semgrep)
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/csharp

      - name: Setup .NET 11
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x

      - name: Gate 3 - NuGet Dependency Audit
        run: |
          dotnet restore Sentinel.slnx
          dotnet list Sentinel.slnx package --vulnerable --include-transitive

      - name: Gate 4 - Test & Coverage
        run: |
          dotnet test Sentinel.slnx \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            --logger "trx;LogFileName=test-results.trx"

      - name: Gate 5 - Build API Container
        run: docker build -t sentinel-api:local -f src/Sentinel.Presentation/Dockerfile .

      - name: Start API Container For DAST
        run: |
          docker run -d --name sentinel-api -p 8080:8080 sentinel-api:local
          sleep 10

      - name: Gate 5 - DAST (ZAP Baseline)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:8080
          fail_action: true

      - name: Gate 6 - IaC Scan (Checkov)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          quiet: true

      - name: Gate 7 - Container Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@v0.35
        with:
          image-ref: sentinel-api:local
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Gate 8 - Generate SBOM
        uses: anchore/sbom-action@v0.23
        with:
          image: sentinel-api:local
          format: spdx-json
          output-file: sentinel-sbom.spdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Gate 9 - Sign Image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "cosign sign --yes [REGISTRY]/sentinel-api@sha256:[DIGEST]"

      - name: Stop API Container
        if: always()
        run: docker rm -f sentinel-api || true
openapi: 3.1.0
info:
  title: Sentinel API
  version: 2026-03-21
  description: |-
    Current OpenAPI reference for the Sentinel API surface.

    Authentication modes:
    - Standard JWT + DPoP for bearer-style protected endpoints.
    - SD-JWT presentation routing when the authorization token contains `~` separators.
    - SSF event ingestion via `POST /v1/ssf/events`.

    DPoP nonce behavior:
    - Nonce challenge responses use `401 Unauthorized`.
    - The response includes `WWW-Authenticate: DPoP error="use_dpop_nonce"` and `DPoP-Nonce` when the client must retry with a fresh nonce.

servers:
  - url: https://api.sentinel.local
    description: Production
  - url: https://staging-api.sentinel.local
    description: Staging

paths:
  /v1/profile:
    get:
      summary: Get authenticated profile
      security:
        - BearerAuth: []
          DpopProof: []
      responses:
        '200':
          description: Profile returned
        '401':
          description: Authentication failed or nonce challenge
        '403':
          description: Missing required scope or ACR
    put:
      summary: Update display name
      security:
        - BearerAuth: []
          DpopProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                displayName:
                  type: string
              required: [displayName]
      responses:
        '200':
          description: Profile updated
        '400':
          description: Invalid request
        '401':
          description: Authentication failed

  /v1/auth/refresh:
    post:
      summary: Refresh access token
      security:
        - BearerAuth: []
          DpopProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required: [refreshToken]
      responses:
        '200':
          description: Token refreshed
        '400':
          description: Invalid request payload
        '401':
          description: Refresh rejected
        '503':
          description: Replay cache unavailable

  /v1/auth/change-password:
    post:
      summary: Change password
      security:
        - BearerAuth: []
          DpopProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
              required: [currentPassword, newPassword]
      responses:
        '204':
          description: Password updated
        '400':
          description: Validation failed
        '401':
          description: Authentication failed
        '409':
          description: Idempotency conflict

  /v1/auth/logout:
    post:
      summary: Logout current session
      security:
        - BearerAuth: []
          DpopProof: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required: [refreshToken]
      responses:
        '204':
          description: Logout accepted
        '400':
          description: Invalid request
        '401':
          description: Authentication failed
        '409':
          description: Idempotency conflict

  /v1/auth/logout-all:
    post:
      summary: Revoke all sessions for current subject
      security:
        - BearerAuth: []
          DpopProof: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Global logout completed
        '401':
          description: Authentication failed
        '409':
          description: Idempotency conflict
        '500':
          description: Revocation failure

  /v1/auth/sessions:
    get:
      summary: List active sessions for current subject
      security:
        - BearerAuth: []
          DpopProof: []
      responses:
        '200':
          description: Sessions returned
        '401':
          description: Authentication failed

  /v1/auth/sessions/{sessionId}:
    delete:
      summary: Revoke one session
      security:
        - BearerAuth: []
          DpopProof: []
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session revoked
        '400':
          description: Invalid request
        '401':
          description: Authentication failed
        '404':
          description: Session not found
        '409':
          description: Idempotency conflict

  /v1/auth/account:
    delete:
      summary: Delete current account
      security:
        - BearerAuth: []
          DpopProof: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Account deleted
        '401':
          description: Authentication failed
        '409':
          description: Idempotency conflict
        '500':
          description: Delete failure

  /v1/auth/mfa/totp/setup:
    post:
      summary: Start TOTP setup
      security:
        - BearerAuth: []
          DpopProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deviceName:
                  type: string
              required: [deviceName]
      responses:
        '401':
          description: Authentication failed
        '501':
          description: MFA management is not configured

  /v1/auth/mfa/totp/verify:
    post:
      summary: Verify TOTP setup
      security:
        - BearerAuth: []
          DpopProof: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '401':
          description: Authentication failed
        '501':
          description: MFA management is not configured

  /v1/auth/mfa/totp:
    delete:
      summary: Delete TOTP configuration
      security:
        - BearerAuth: []
          DpopProof: []
      responses:
        '401':
          description: Authentication failed
        '501':
          description: MFA management is not configured

  /v1/auth/mfa/recovery-codes:
    get:
      summary: Get recovery codes
      security:
        - BearerAuth: []
          DpopProof: []
      responses:
        '401':
          description: Authentication failed
        '501':
          description: MFA management is not configured

  /v1/auth/mfa/recovery-codes/regenerate:
    post:
      summary: Regenerate recovery codes
      security:
        - BearerAuth: []
          DpopProof: []
      responses:
        '401':
          description: Authentication failed
        '501':
          description: MFA management is not configured

  /v1/auth/token-exchange:
    post:
      summary: Exchange external provider token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                externalToken:
                  type: string
                providerName:
                  type: string
                codeVerifier:
                  type: string
              required: [externalToken, providerName, codeVerifier]
      responses:
        '200':
          description: Exchange succeeded
        '400':
          description: Missing request data or DPoP proof
        '401':
          description: Exchange rejected

  /v1/auth/backchannel-logout:
    post:
      summary: Backchannel logout callback
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                logout_token:
                  type: string
              required: [logout_token]
      responses:
        '200':
          description: Session invalidated
        '400':
          description: Invalid logout token

  /v1/users/register:
    post:
      summary: Register a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Registration accepted
        '400':
          description: Validation failed

  /v1/users/verify-email:
    post:
      summary: Verify email token
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified
        '400':
          description: Invalid or expired token

  /v1/users/forgot-password:
    post:
      summary: Request password reset
      responses:
        '202':
          description: Request accepted

  /v1/users/resend-verification:
    post:
      summary: Resend verification email
      responses:
        '202':
          description: Request accepted

  /v1/users/reset-password:
    post:
      summary: Reset password
      responses:
        '200':
          description: Password reset completed
        '400':
          description: Invalid request
        '500':
          description: Reset failure

  /v1/documents:
    get:
      summary: List documents for current subject
      security:
        - BearerAuth: []
          DpopProof: []
      responses:
        '200':
          description: Documents returned
        '401':
          description: Authentication failed
        '403':
          description: Missing required scope or ACR
    post:
      summary: Create document
      security:
        - BearerAuth: []
          DpopProof: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Document created
        '400':
          description: Invalid request
        '401':
          description: Authentication failed
        '403':
          description: Missing required scope or ACR
        '409':
          description: Idempotency conflict

  /v1/documents/{id}:
    get:
      summary: Get one document scoped by subject ownership
      security:
        - BearerAuth: []
          DpopProof: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document returned
        '401':
          description: Authentication failed
        '403':
          description: Missing required scope or ACR
        '404':
          description: Not found
    put:
      summary: Update document
      security:
        - BearerAuth: []
          DpopProof: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document updated
        '401':
          description: Authentication failed
        '403':
          description: Missing scope, ACR, or mTLS binding
        '404':
          description: Not found
        '409':
          description: Idempotency conflict
    delete:
      summary: Delete document
      security:
        - BearerAuth: []
          DpopProof: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Document deleted
        '401':
          description: Authentication failed
        '403':
          description: Missing scope, ACR, or mTLS binding
        '404':
          description: Not found

  /v1/finance/transfer:
    post:
      summary: Execute transfer under RAR-like payload bounds
      security:
        - BearerAuth: []
          DpopProof: []
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
                amount:
                  type: number
                currency:
                  type: string
                destinationAccount:
                  type: string
              required: [transactionId, amount, currency, destinationAccount]
      responses:
        '200':
          description: Transfer accepted
        '400':
          description: Invalid request
        '401':
          description: Authentication failed
        '403':
          description: Authorization bounds exceeded
        '409':
          description: Idempotency conflict

  /v1/ssf/events:
    post:
      summary: Receive SSF security event token
      requestBody:
        required: true
        content:
          application/secevent+jwt:
            schema:
              type: string
          application/json:
            schema:
              type: object
              properties:
                set:
                  type: string
              required: [set]
      responses:
        '202':
          description: Event accepted
        '400':
          description: Invalid SET payload
        '401':
          description: Authentication or signature validation failed
        '500':
          description: Processing failed closed
        '503':
          description: Downstream security state unavailable

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token or SD-JWT presentation in the Authorization header.
    DpopProof:
      type: apiKey
      in: header
      name: DPoP
      description: DPoP proof JWT used with standard bearer-style protected routes.

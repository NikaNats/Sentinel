apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      prometheus:
        config:
          scrape_configs:
            - job_name: sentinel-api
              scheme: https
              metrics_path: /metrics
              scrape_interval: 15s
              scrape_timeout: 5s
              tls_config:
                insecure_skip_verify: false
                ca_file: /var/run/sentinel/ca/ca.crt
              static_configs:
                - targets:
                    - sentinel-api.sentinel-prod.svc.cluster.local:8080

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 410
        spike_limit_mib: 102

      batch:
        timeout: 2s
        send_batch_size: 8192
        send_batch_max_size: 16384

      resource:
        attributes:
          - key: deployment.environment
            value: production
            action: upsert

          - key: service.namespace
            value: sentinel
            action: upsert

    exporters:
      otlp/siem:
        endpoint: siem-otlp-gateway.security.svc.cluster.local:4317
        tls:
          ca_file: /var/run/sentinel/siem/ca.crt
          cert_file: /var/run/sentinel/siem/tls.crt
          key_file: /var/run/sentinel/siem/tls.key

    service:
      telemetry:
        logs:
          level: info

      pipelines:
        traces:
          receivers:
            - otlp
          processors:
            - memory_limiter
            - resource
            - batch
          exporters:
            - otlp/siem

        metrics:
          receivers:
            - otlp
            - prometheus
          processors:
            - memory_limiter
            - resource
            - batch
          exporters:
            - otlp/siem
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: sentinel
spec:
  replicas: 2
  revisionHistoryLimit: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector

  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/part-of: sentinel

    spec:
      serviceAccountName: otel-collector
      automountServiceAccountToken: false
      enableServiceLinks: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.127.0
          imagePullPolicy: IfNotPresent

          args:
            - --config=/etc/otelcol/collector.yaml

          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP

            - name: otlp-http
              containerPort: 4318
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true

            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 250m
              memory: 256Mi

            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true

            - name: tmp
              mountPath: /tmp

            - name: sentinel-ca
              mountPath: /var/run/sentinel/ca
              readOnly: true

            - name: siem-mtls
              mountPath: /var/run/sentinel/siem
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: otel-collector-config

        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi

        - name: sentinel-ca
          secret:
            secretName: sentinel-ca-bundle
            defaultMode: 0440

        - name: siem-mtls
          secret:
            secretName: sentinel-siem-mtls
            defaultMode: 0440
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
spec:
  type: ClusterIP

  selector:
    app.kubernetes.io/name: otel-collector

  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP

    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

apiVersion: v1
kind: Namespace
metadata:
  name: sentinel-prod
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: sentinel-api-quota
  namespace: sentinel-prod
spec:
  hard:
    pods: "6"
    requests.cpu: "1500m"
    requests.memory: "1536Mi"
    limits.cpu: "3000m"
    limits.memory: "3Gi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-api
  namespace: sentinel-prod
  labels:
    app.kubernetes.io/name: sentinel-api
    app.kubernetes.io/part-of: sentinel
    app.kubernetes.io/component: identity-gateway
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinel-api
      app.kubernetes.io/part-of: sentinel
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinel-api
        app.kubernetes.io/part-of: sentinel
        app.kubernetes.io/component: identity-gateway
        app.kubernetes.io/version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/scheme: "https"
        prometheus.io/path: /metrics
        prometheus.io/port: "8080"
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sentinel-api
          image: ghcr.io/acme/sentinel-api:v1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: https
              containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: Production
            - name: ASPNETCORE_URLS
              value: https://+:8080
            - name: ASPNETCORE_Kestrel__Certificates__Default__Path
              value: /var/run/sentinel/tls/tls.crt
            - name: ASPNETCORE_Kestrel__Certificates__Default__KeyPath
              value: /var/run/sentinel/tls/tls.key
            - name: DOTNET_EnableDiagnostics
              value: "0"
            - name: DOTNET_SYSTEM_NET_DISABLEIPV6
              value: "0"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability.svc.cluster.local:4317
            - name: OTEL_SERVICE_NAME
              value: sentinel-api
            - name: ConnectionStrings__Redis
              valueFrom:
                secretKeyRef:
                  name: sentinel-runtime-secrets
                  key: redis-connection-string
            - name: Keycloak__Authority
              value: https://keycloak.keycloak.svc.cluster.local:8443/realms/sentinel
            - name: Keycloak__Audience
              value: sentinel-api
            - name: Keycloak__RequireHttpsMetadata
              value: "true"
            - name: Sentinel__Keycloak__Authority
              value: https://keycloak.keycloak.svc.cluster.local:8443/realms/sentinel
            - name: Sentinel__Keycloak__Audience
              value: sentinel-api
            - name: Sentinel__Keycloak__RequireHttpsMetadata
              value: "true"
            - name: Sentinel__Keycloak__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: sentinel-runtime-secrets
                  key: keycloak-client-secret
            - name: Security__TrustedRootCaPath
              value: /var/run/sentinel/ca/ca.crt
          securityContext:
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: tls
              mountPath: /var/run/sentinel/tls
              readOnly: true
            - name: sentinel-ca
              mountPath: /var/run/sentinel/ca
              readOnly: true
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        - name: tls
          secret:
            secretName: sentinel-api-tls
            defaultMode: 0440
        - name: sentinel-ca
          secret:
            secretName: sentinel-ca-bundle
            defaultMode: 0440
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-api
  namespace: sentinel-prod
  labels:
    app.kubernetes.io/name: sentinel-api
    app.kubernetes.io/part-of: sentinel
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sentinel-api
    app.kubernetes.io/part-of: sentinel
  ports:
    - name: https
      port: 8080
      targetPort: 8080
      protocol: TCP
